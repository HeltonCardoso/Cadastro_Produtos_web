{% extends 'base_login.html' %}

{% block title %}Login - Sistema{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-chart-line"></i>
            <h2>Sistema de Gestão</h2>
            <p>Faça login com seu perfil</p>
        </div>
        
        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Usuário
                </label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       class="form-control"
                       placeholder="Digite seu usuário"
                       required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i class="fas fa-key"></i> Senha
                </label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       class="form-control"
                       placeholder="Digite sua senha"
                       required>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>
        
        <div class="login-info">
            <div class="perfis-info">
                <small>Perfis disponíveis:</small>
                <div class="perfis-badges">
                    <span class="badge-master">Master</span>
                    <span class="badge-sac">SAC</span>
                    <span class="badge-cadastro">Cadastro</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.login-wrapper {
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    padding: 20px;
}

.login-card {
    background: white;
    border-radius: 10px;
    padding: 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.login-header {
    text-align: center;
    margin-bottom: 30px;
}

.login-header i {
    font-size: 48px;
    color: #0f3460;
}

.login-header h2 {
    margin: 10px 0 5px;
    color: #333;
}

.login-header p {
    color: #666;
    font-size: 14px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    color: #555;
    font-weight: 500;
}

.form-group label i {
    margin-right: 8px;
    color: #0f3460;
}

.form-control {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 14px;
}

.form-control:focus {
    outline: none;
    border-color: #0f3460;
}

.btn-login {
    width: 100%;
    padding: 12px;
    background: #0f3460;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

.btn-login:hover {
    background: #1a4a7a;
}

.login-info {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #eee;
    text-align: center;
}

.perfis-info {
    font-size: 12px;
    color: #666;
}

.perfis-badges {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 8px;
}

.badge-master, .badge-sac, .badge-cadastro {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
}

.badge-master { background: #dc3545; color: white; }
.badge-sac { background: #28a745; color: white; }
.badge-cadastro { background: #ffc107; color: #333; }
</style>
{% endblock %}
