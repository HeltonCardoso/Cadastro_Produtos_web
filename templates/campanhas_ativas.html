{% extends "base.html" %}

{% block content %}
<div class="container-fluid mt-4" style="max-width: 1400px;">
    <!-- Cabeçalho -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 fw-light mb-1" style="color: #333;">
                <i class="fas fa-store me-2" style="color: #3483fa;"></i>
                Central de Promoções
            </h1>
            <p class="text-muted small mb-0" id="infoUsuario">
                <i class="fas fa-user-circle me-1"></i> Carregando...
            </p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-light btn-sm border" onclick="buscarCampanhas()" style="color: #3483fa;">
                <i class="fas fa-sync-alt me-1"></i> Atualizar
            </button>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-5">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
        <p class="mt-3 text-muted small">Carregando suas promoções...</p>
    </div>

    <!-- Grid de Promoções -->
    <div id="promocoesGrid" class="row g-4" style="display: none;">
        <!-- Cards serão inseridos aqui -->
    </div>

    <!-- Modal de Produtos -->
    <div class="modal fade" id="modalProdutos" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-xl">
            <div class="modal-content" style="border-radius: 12px;">
                <div class="modal-header" style="border-bottom: 1px solid #eee;">
                    <h5 class="modal-title fw-light" id="modalTituloPromocao">
                        <i class="fas fa-boxes me-2" style="color: #3483fa;"></i>
                        Produtos na promoção
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <!-- Abas para separar produtos por status -->
                    <ul class="nav nav-tabs mb-4" id="produtosTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="todos-tab" data-bs-toggle="tab" data-bs-target="#todos" type="button" role="tab">
                                Todos <span class="badge bg-secondary ms-2" id="badgeTodos">0</span>
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="elegiveis-tab" data-bs-toggle="tab" data-bs-target="#elegiveis" type="button" role="tab">
                                Elegíveis <span class="badge bg-warning ms-2" id="badgeElegiveis">0</span>
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="participando-tab" data-bs-toggle="tab" data-bs-target="#participando" type="button" role="tab">
                                Participando <span class="badge bg-success ms-2" id="badgeParticipando">0</span>
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="programados-tab" data-bs-toggle="tab" data-bs-target="#programados" type="button" role="tab">
                                Programados <span class="badge bg-info ms-2" id="badgeProgramados">0</span>
                            </button>
                        </li>
                    </ul>
                    
                    <!-- Loading -->
                    <div id="loadingProdutos" class="text-center py-4">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                    </div>
                    
                    <!-- Conteúdo das abas -->
                    <div class="tab-content" id="produtosTabContent">
                        <div class="tab-pane fade show active" id="todos" role="tabpanel">
                            <div id="todosContainer" class="row g-3"></div>
                        </div>
                        <div class="tab-pane fade" id="elegiveis" role="tabpanel">
                            <div id="elegiveisContainer" class="row g-3"></div>
                        </div>
                        <div class="tab-pane fade" id="participando" role="tabpanel">
                            <div id="participandoContainer" class="row g-3"></div>
                        </div>
                        <div class="tab-pane fade" id="programados" role="tabpanel">
                            <div id="programadosContainer" class="row g-3"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
/* Cards de campanha */
.promocao-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: all 0.2s;
    height: 100%;
    display: flex;
    flex-direction: column;
    border: 1px solid #f0f0f0;
}

.promocao-card:hover {
    box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    transform: translateY(-2px);
}

.promocao-header {
    padding: 16px 20px;
    border-bottom: 1px solid #f0f0f0;
    background: white;
}

.promocao-titulo {
    font-size: 16px;
    font-weight: 500;
    color: #333;
    margin: 8px 0;
    line-height: 1.4;
}

.promocao-tipo-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #f5f5f5;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    color: #666;
}

.promocao-periodo {
    font-size: 13px;
    color: #999;
    margin: 8px 0 0 0;
    display: flex;
    align-items: center;
    gap: 6px;
}

.promocao-body {
    padding: 16px 20px;
    flex: 1;
}

/* Cards de produto */
.produto-card {
    background: white;
    border: 1px solid #f0f0f0;
    border-radius: 10px;
    padding: 12px;
    transition: all 0.2s;
    height: 100%;
}

.produto-card:hover {
    border-color: #3483fa;
    box-shadow: 0 4px 12px rgba(52,131,250,0.1);
}

.produto-card.elegivel {
    border-left: 4px solid #ffc107;
}

.produto-card.participando {
    border-left: 4px solid #28a745;
}

.produto-card.programado {
    border-left: 4px solid #17a2b8;
}

.produto-card.finalizado {
    border-left: 4px solid #6c757d;
    opacity: 0.7;
}

/* Badges de status */
.status-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
}

.status-badge.elegivel {
    background: #fff3cd;
    color: #856404;
}

.status-badge.participando {
    background: #d4edda;
    color: #155724;
}

.status-badge.programado {
    background: #d1ecf1;
    color: #0c5460;
}

.status-badge.finalizado {
    background: #e2e3e5;
    color: #383d41;
}

/* Indicador de urgência */
.urgente-badge {
    background: #dc3545;
    color: white;
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.8; }
    100% { opacity: 1; }
}

/* Grid de informações */
.info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin: 12px 0;
}

.info-item {
    background: #f8f9fa;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
}

.info-label {
    color: #6c757d;
    font-size: 10px;
    margin-bottom: 2px;
}

.info-value {
    font-weight: 600;
    color: #333;
}

/* Preços */
.preco-original {
    color: #999;
    font-size: 12px;
    text-decoration: line-through;
}

.preco-promocional {
    color: #00a650;
    font-size: 16px;
    font-weight: 700;
}

.desconto-badge {
    background: #00a650;
    color: white;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
}

/* Botão */
.btn-outline-primary {
    border: 1px solid #3483fa;
    color: #3483fa;
    background: none;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    transition: all 0.2s;
}

.btn-outline-primary:hover {
    background: #3483fa;
    color: white;
}
</style>

<script>
// Mapeamento de tipos de campanha para português
const tipoMap = {
    'DEAL': { nome: 'Campanha Tradicional', icone: '🎯' },
    'SELLER_CAMPAIGN': { nome: 'Criada por Você', icone: '📢' },
    'MARKETPLACE_CAMPAIGN': { nome: 'Co-participação ML', icone: '🤝' },
    'LIGHTNING': { nome: 'Oferta Relâmpago', icone: '⚡' },
    'DOD': { nome: 'Oferta do Dia', icone: '🌞' },
    'VOLUME': { nome: 'Desconto por Volume', icone: '📦' },
    'PRICE_DISCOUNT': { nome: 'Desconto Individual', icone: '💰' },
    'SMART': { nome: 'Co-participação Automática', icone: '🤖' },
    'PRICE_MATCHING': { nome: 'Preço Competitivo', icone: '🏆' },
    'UNHEALTHY_STOCK': { nome: 'Liquidação Estoque', icone: '🏷️' },
    'SELLER_COUPON_CAMPAIGN': { nome: 'Cupons', icone: '🎫' },
    'PRE_NEGOTIATED': { nome: 'Desconto Pré-acordado', icone: '✍️' }
};

// Mapeamento de status para português
const statusMap = {
    'candidate': { nome: 'Elegível', cor: 'warning' },
    'pending': { nome: 'Programado', cor: 'info' },
    'started': { nome: 'Participando', cor: 'success' },
    'finished': { nome: 'Finalizado', cor: 'secondary' }
};

let todasCampanhas = [];
let modalInstance;

document.addEventListener('DOMContentLoaded', function() {
    modalInstance = new bootstrap.Modal(document.getElementById('modalProdutos'));
    buscarCampanhas();
});

function buscarCampanhas() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('promocoesGrid').style.display = 'none';

    fetch('/api/campanhas-ativas')
        .then(response => response.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';

            if (data.sucesso && data.todas_campanhas && data.todas_campanhas.length > 0) {
                todasCampanhas = data.todas_campanhas;
                
                document.getElementById('infoUsuario').innerHTML = `
                    <i class="fas fa-user-circle me-1"></i> ${data.user_nickname || 'Usuário'} · 
                    <span class="fw-bold">${todasCampanhas.length}</span> promoções
                `;
                
                renderizarPromocoes(todasCampanhas);
            } else {
                document.getElementById('promocoesGrid').innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-bullhorn fa-4x text-muted mb-3"></i>
                        <p class="text-muted">Nenhuma promoção encontrada</p>
                    </div>
                `;
                document.getElementById('promocoesGrid').style.display = 'flex';
            }
        })
        .catch(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('promocoesGrid').style.display = 'none';
        });
}

function renderizarPromocoes(campanhas) {
    const grid = document.getElementById('promocoesGrid');
    let html = '';

    campanhas.forEach(campanha => {
        const tipoInfo = tipoMap[campanha.tipo] || { nome: campanha.tipo, icone: '📋' };
        const dataInicio = formatarDataML(campanha.data_inicio);
        const dataFim = formatarDataML(campanha.data_fim);
        
        // Verificar se está próximo do prazo (menos de 24h para acabar)
        const horasRestantes = calcularHorasRestantes(campanha.data_fim);
        const isUrgente = horasRestantes !== null && horasRestantes <= 24;
        
        html += `
            <div class="col-xl-3 col-lg-4 col-md-6">
                <div class="promocao-card">
                    <div class="promocao-header">
                        <div class="d-flex justify-content-between align-items-start">
                            <span class="promocao-tipo-badge">
                                <span>${tipoInfo.icone}</span>
                                ${tipoInfo.nome}
                            </span>
                            ${isUrgente ? '<span class="urgente-badge"><i class="fas fa-clock me-1"></i>Últimas 24h!</span>' : ''}
                        </div>
                        <h6 class="promocao-titulo">${campanha.nome}</h6>
                        <p class="promocao-periodo">
                            <i class="fas fa-calendar-alt" style="color: #3483fa;"></i>
                            ${dataInicio} - ${dataFim}
                        </p>
                    </div>
                    
                    <div class="promocao-body">
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <span class="badge bg-light text-dark">
                                <i class="fas fa-hashtag"></i> ID: ${campanha.id.substring(0, 8)}...
                            </span>
                            ${campanha.beneficios ? `
                                <span class="badge bg-light text-dark">
                                    <i class="fas fa-percent"></i> ML: ${campanha.beneficios.meli_percent || 0}%
                                </span>
                            ` : ''}
                        </div>
                    </div>
                    
                    <div class="p-3 pt-0">
                        <button class="btn-outline-primary w-100" onclick="verProdutos('${campanha.id}', '${campanha.tipo}', '${campanha.nome.replace(/'/g, "\\'")}')">
                            <i class="fas fa-boxes me-1"></i> Ver produtos
                        </button>
                    </div>
                </div>
            </div>
        `;
    });

    grid.innerHTML = html;
    grid.style.display = 'flex';
}

function verProdutos(promotionId, promotionType, nomePromocao) {
    document.getElementById('modalTituloPromocao').innerHTML = `
        <i class="fas fa-boxes me-2" style="color: #3483fa;"></i>
        ${nomePromocao}
    `;
    
    // Resetar abas e containers
    document.getElementById('todosContainer').innerHTML = '';
    document.getElementById('elegiveisContainer').innerHTML = '';
    document.getElementById('participandoContainer').innerHTML = '';
    document.getElementById('programadosContainer').innerHTML = '';
    
    document.getElementById('loadingProdutos').style.display = 'block';
    document.getElementById('produtosTabs').style.display = 'none';
    
    modalInstance.show();
    
    fetch(`/api/campanha/${promotionId}/itens?type=${promotionType}`)
        .then(response => response.json())
        .then(data => {
            document.getElementById('loadingProdutos').style.display = 'none';
            document.getElementById('produtosTabs').style.display = 'flex';
            
            if (data.sucesso && data.itens && data.itens.length > 0) {
                const itens = data.itens;
                
                // Contar por status
                const elegiveis = itens.filter(i => i.status === 'candidate').length;
                const participando = itens.filter(i => i.status === 'started').length;
                const programados = itens.filter(i => i.status === 'pending').length;
                
                document.getElementById('badgeTodos').textContent = itens.length;
                document.getElementById('badgeElegiveis').textContent = elegiveis;
                document.getElementById('badgeParticipando').textContent = participando;
                document.getElementById('badgeProgramados').textContent = programados;
                
                // Renderizar cada categoria
                renderizarItens('todosContainer', itens);
                renderizarItens('elegiveisContainer', itens.filter(i => i.status === 'candidate'));
                renderizarItens('participandoContainer', itens.filter(i => i.status === 'started'));
                renderizarItens('programadosContainer', itens.filter(i => i.status === 'pending'));
            } else {
                document.getElementById('todosContainer').innerHTML = `
                    <div class="col-12 text-center py-4 text-muted">
                        <i class="fas fa-box-open fa-3x mb-3" style="color: #ccc;"></i>
                        <p>Nenhum produto encontrado nesta promoção</p>
                    </div>
                `;
            }
        })
        .catch(() => {
            document.getElementById('loadingProdutos').style.display = 'none';
            document.getElementById('todosContainer').innerHTML = `
                <div class="col-12 text-center py-4 text-muted">
                    <i class="fas fa-exclamation-triangle fa-3x mb-3" style="color: #ccc;"></i>
                    <p>Erro ao carregar produtos</p>
                </div>
            `;
        });
}

function renderizarItens(containerId, itens) {
    const container = document.getElementById(containerId);
    
    if (itens.length === 0) {
        container.innerHTML = `
            <div class="col-12 text-center py-4 text-muted">
                <p>Nenhum produto nesta categoria</p>
            </div>
        `;
        return;
    }
    
    let html = '';
    itens.forEach(item => {
        const statusInfo = statusMap[item.status] || { nome: item.status, cor: 'secondary' };
        const statusClass = {
            'candidate': 'elegivel',
            'started': 'participando',
            'pending': 'programado',
            'finished': 'finalizado'
        }[item.status] || '';
        
        html += `
            <div class="col-md-6">
                <div class="produto-card ${statusClass}">
                    <div class="d-flex gap-3">
                        ${item.thumbnail ? 
                            `<img src="${item.thumbnail}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">` :
                            `<div class="bg-light" style="width: 80px; height: 80px; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                                <i class="fas fa-box fa-2x text-muted"></i>
                            </div>`
                        }
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <div class="small text-muted mb-1">${item.id}</div>
                                    <div class="fw-bold small">${item.titulo || 'Sem título'}</div>
                                </div>
                                <span class="status-badge ${item.status}">
                                    ${statusInfo.nome}
                                </span>
                            </div>
                            
                            <div class="info-grid">
                                ${item.preco_original ? `
                                    <div class="info-item">
                                        <div class="info-label">Original</div>
                                        <div class="info-value">R$ ${item.preco_original}</div>
                                    </div>
                                ` : ''}
                                
                                <div class="info-item">
                                    <div class="info-label">Promocional</div>
                                    <div class="info-value text-success">R$ ${item.preco_promocional}</div>
                                </div>
                                
                                ${item.desconto > 0 ? `
                                    <div class="info-item">
                                        <div class="info-label">Desconto</div>
                                        <div class="info-value text-success">-${item.desconto}%</div>
                                    </div>
                                ` : ''}
                                
                                ${item.is_urgente ? `
                                    <div class="info-item">
                                        <div class="info-label">Início</div>
                                        <div class="info-value text-danger">
                                            <i class="fas fa-clock"></i> ${item.horas_para_inicio}h
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                            
                            ${item.percentual_meli ? `
                                <div class="small text-muted mt-2">
                                    <i class="fas fa-handshake"></i> 
                                    ML: ${item.percentual_meli}% | Você: ${item.percentual_vendedor}%
                                </div>
                            ` : ''}
                            
                            ${item.preco_minimo ? `
                                <div class="small text-muted">
                                    Preço permitido: R$ ${item.preco_minimo} - R$ ${item.preco_maximo}
                                </div>
                            ` : ''}
                            
                            ${item.stock_min ? `
                                <div class="small text-muted">
                                    <i class="fas fa-boxes"></i> Estoque necessário: ${item.stock_min} - ${item.stock_max}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function formatarDataML(dataStr) {
    if (!dataStr || dataStr === 'N/A') return 'N/A';
    try {
        const data = new Date(dataStr);
        const meses = ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN', 
                      'JUL', 'AGO', 'SET', 'OUT', 'NOV', 'DEZ'];
        return `${data.getDate()} ${meses[data.getMonth()]}`;
    } catch {
        return dataStr;
    }
}

function calcularHorasRestantes(dataStr) {
    if (!dataStr || dataStr === 'N/A') return null;
    try {
        const fim = new Date(dataStr);
        const agora = new Date();
        const diff = fim - agora;
        return Math.ceil(diff / (1000 * 60 * 60));
    } catch {
        return null;
    }
}
</script>
{% endblock %}
